<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Carta — Chiringuito Lounge</title>
<meta name="description" content="La carta de Chiringuito Lounge, Mercado de Maschwitz.">
<meta name="theme-color" content="#171310">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --carbon:#171310;          /* fondo: madera oscura de noche */
    --carbon-2:#221C16;        /* paneles */
    --hueso:#F4EEE3;           /* texto principal */
    --hueso-dim:#B9AF9E;       /* texto secundario */
    --ambar:#E0A33E;           /* precios y acentos calientes */
    --botella:#A8231D;         /* rojo Chiringo (cintas, activos) */
    --botella-claro:#C63A30;
    --linea:rgba(244,238,227,.12);
    --display:'Oswald',sans-serif;
    --texto:'Jost',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    background:
      radial-gradient(130% 70% at 50% -10%, rgba(224,163,62,.10), transparent 55%),
      var(--carbon);
    color:var(--hueso);
    font-family:var(--texto);font-weight:300;letter-spacing:.01em;
    min-height:100dvh;
  }

  /* ---------- HEADER (estética placa) ---------- */
  header{
    padding:calc(env(safe-area-inset-top) + 30px) 20px 24px;
    text-align:center;position:relative;overflow:hidden;
    border-bottom:1px solid var(--linea);
  }
  .cinta{
    display:inline-block;transform:rotate(-3deg);
    background:linear-gradient(160deg, var(--botella-claro), var(--botella));
    color:var(--hueso);
    font-family:var(--texto);font-weight:500;font-size:11px;
    letter-spacing:.34em;text-transform:uppercase;
    padding:7px 18px;border-radius:3px;
    box-shadow:0 6px 18px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.14);
  }
  h1{
    font-family:var(--display);font-weight:700;
    text-transform:uppercase;
    font-size:clamp(46px,12.5vw,84px);
    line-height:.98;letter-spacing:.015em;
    margin-top:16px;
    text-shadow:0 4px 22px rgba(0,0,0,.55);
  }
  h1 span{display:block;font-size:.52em;font-weight:600;letter-spacing:.12em;color:var(--ambar)}
  .sub{
    margin-top:10px;font-size:12px;color:var(--hueso-dim);
    letter-spacing:.22em;text-transform:uppercase;font-weight:400;
  }

  /* ---------- TABS ---------- */
  nav{
    position:sticky;top:0;z-index:40;
    background:linear-gradient(rgba(23,19,16,.94), rgba(23,19,16,.82));
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid var(--linea);
  }
  .tabs{
    display:flex;gap:8px;overflow-x:auto;
    padding:13px 16px;scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto;cursor:pointer;white-space:nowrap;
    font-family:var(--display);font-weight:500;font-size:14px;
    letter-spacing:.08em;text-transform:uppercase;
    color:var(--hueso-dim);
    padding:9px 16px;border-radius:999px;
    background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.015));
    border:1px solid rgba(244,238,227,.14);
    box-shadow:0 2px 10px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
    transition:color .2s, background .2s, transform .15s, box-shadow .2s;
  }
  .tab:active{transform:scale(.96)}
  .tab.activa{
    color:var(--hueso);
    background:linear-gradient(160deg, var(--botella-claro), var(--botella));
    border-color:rgba(244,238,227,.22);
    box-shadow:0 6px 16px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.16);
  }

  /* ---------- SECCIONES + GRILLA ---------- */
  main{padding-bottom:90px}
  section{padding-top:6px}
  .titulo-seccion{
    display:flex;align-items:center;gap:14px;
    padding:30px 20px 14px;
  }
  .titulo-seccion h2{
    font-family:var(--display);font-weight:600;text-transform:uppercase;
    font-size:27px;line-height:1;letter-spacing:.04em;
  }
  .titulo-seccion .cuenta{
    font-family:var(--texto);font-size:10.5px;font-weight:500;
    color:var(--hueso-dim);letter-spacing:.2em;
    border:1px solid var(--linea);border-radius:999px;padding:4px 10px;
  }
  .titulo-seccion .filete{flex:1;height:1px;background:var(--linea)}
  .grilla{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
  @media(min-width:720px){
    .grilla{grid-template-columns:repeat(4,1fr);gap:3px}
    main{max-width:960px;margin:0 auto}
  }
  .tile{
    position:relative;aspect-ratio:1;overflow:hidden;
    background:var(--carbon-2);cursor:pointer;border:none;padding:0;
  }
  .tile img,.tile video{
    width:100%;height:100%;object-fit:cover;display:block;
    transition:transform .35s ease-out;
  }
  .tile:active img{transform:scale(1.05)}

  /* chip flotante estilo LaCarta: no tapa el plato */
  .tile .chip{
    position:absolute;left:6px;bottom:6px;max-width:calc(100% - 12px);
    display:flex;flex-direction:column;align-items:flex-start;gap:2px;
    pointer-events:none;
  }
  .tile .chip .nombre{
    font-family:var(--texto);font-weight:500;font-size:11px;line-height:1.2;
    color:var(--hueso);
    background:rgba(15,12,9,.62);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:7px;padding:4px 8px;
    max-width:100%;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .tile .chip .precio{
    font-family:var(--display);font-weight:600;font-size:11.5px;letter-spacing:.05em;
    color:var(--ambar);
    background:rgba(15,12,9,.62);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    border:1px solid rgba(224,163,62,.22);
    border-radius:7px;padding:3px 8px;
  }
  .tile.sin-foto .fondo{
    width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    font-family:var(--display);font-weight:700;font-size:46px;
    color:rgba(244,238,227,.16);
    background:radial-gradient(80% 80% at 50% 30%, #2B241C, var(--carbon-2));
  }

  /* ---------- VISOR VERTICAL ---------- */
  #visor{
    position:fixed;inset:0;z-index:100;background:var(--carbon);
    overflow-y:auto;scroll-snap-type:y mandatory;overscroll-behavior:contain;
    opacity:0;pointer-events:none;transition:opacity .22s ease;
  }
  #visor.abierto{opacity:1;pointer-events:auto}
  .slide{
    height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;
    display:flex;flex-direction:column;position:relative;
  }
  .slide .media{flex:1 1 0;min-height:0;position:relative;background:var(--carbon-2)}
  .slide .media img,.slide .media video{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  .slide .media::after{
    content:"";position:absolute;inset:auto 0 0 0;height:36%;
    background:linear-gradient(to top,var(--carbon),transparent);
  }
  .slide .media .sin{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--display);font-weight:700;font-size:130px;color:rgba(244,238,227,.10);
  }
  .slide .ficha{
    flex:0 0 auto;
    padding:4px 22px calc(env(safe-area-inset-bottom) + 30px);
  }
  .slide .etiqueta{
    display:inline-block;transform:rotate(-2deg);
    background:linear-gradient(160deg, var(--botella-claro), var(--botella));
    color:var(--hueso);font-family:var(--texto);font-weight:500;
    font-size:10px;letter-spacing:.3em;text-transform:uppercase;
    padding:5px 12px;border-radius:3px;
    box-shadow:0 4px 14px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.12);
  }
  .slide h3{
    font-family:var(--display);font-weight:700;text-transform:uppercase;
    font-size:clamp(30px,8.5vw,46px);line-height:1.02;letter-spacing:.015em;
    margin-top:12px;text-shadow:0 3px 16px rgba(0,0,0,.5);
  }
  .slide .desc{
    margin-top:10px;font-size:15px;line-height:1.55;color:var(--hueso-dim);max-width:520px;
  }
  .slide .valor{
    margin-top:14px;
    font-family:var(--display);font-weight:600;font-size:27px;letter-spacing:.04em;
    color:var(--ambar);
  }
  .slide .pista{
    position:absolute;right:18px;bottom:calc(env(safe-area-inset-bottom) + 22px);
    display:flex;flex-direction:column;align-items:center;gap:2px;
    color:var(--hueso-dim);font-size:10px;letter-spacing:.2em;
    animation:flotar 2.2s ease-in-out infinite;
  }
  @keyframes flotar{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  #cerrar{
    position:fixed;top:calc(env(safe-area-inset-top) + 14px);right:14px;z-index:110;
    width:44px;height:44px;border-radius:50%;
    background:rgba(23,19,16,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid var(--linea);color:var(--hueso);
    font-size:20px;line-height:1;cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.4);
    display:none;align-items:center;justify-content:center;
  }
  #visor.abierto ~ #cerrar{display:flex}

  /* ---------- ESTADOS ---------- */
  #cargando,#error{
    min-height:55dvh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;padding:30px;text-align:center;
  }
  .brasa{
    width:10px;height:10px;border-radius:50%;background:var(--ambar);
    animation:brasa 1.1s ease-in-out infinite;
  }
  @keyframes brasa{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  #cargando p,#error p{color:var(--hueso-dim);font-size:14px;letter-spacing:.1em}
  #error{display:none}
  #error button{
    font-family:var(--display);font-weight:600;font-size:14px;
    letter-spacing:.1em;text-transform:uppercase;
    color:var(--hueso);
    background:linear-gradient(160deg, var(--botella-claro), var(--botella));
    border:1px solid rgba(244,238,227,.2);
    border-radius:999px;padding:13px 30px;cursor:pointer;
    box-shadow:0 6px 16px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.14);
  }

  footer{
    padding:36px 20px calc(env(safe-area-inset-bottom) + 42px);
    text-align:center;border-top:1px solid var(--linea);
  }
  footer .f-marca{
    font-family:var(--display);font-weight:600;text-transform:uppercase;
    font-size:19px;letter-spacing:.06em;
  }
  footer p{margin-top:6px;font-size:12px;color:var(--hueso-dim);letter-spacing:.1em}
  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important}
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>

<header>
  <div class="cinta">Grupo El Chiringuito</div>
  <h1>Chiringuito<span>Lounge</span></h1>
  <div class="sub">Mercado de Maschwitz</div>
</header>

<nav id="nav" hidden><div class="tabs" id="tabs"></div></nav>

<div id="cargando"><div class="brasa"></div><p>Encendiendo la carta…</p></div>

<div id="error">
  <p>No pudimos cargar la carta.<br>Fijate la señal y probá de nuevo.</p>
  <button onclick="cargar()">Reintentar</button>
</div>

<main id="carta"></main>

<footer hidden id="pie">
  <div class="f-marca">Chiringuito Lounge</div>
  <p>Mercado de Maschwitz · Ingeniero Maschwitz</p>
</footer>

<div id="visor" aria-modal="true" role="dialog"></div>
<button id="cerrar" aria-label="Cerrar">✕</button>

<script>
/* ================= CONFIG ================= */
var API_URL = 'https://script.google.com/macros/s/AKfycbzOW8QgMiXCM8auujV9DFwGhgvB-yTPk4ukog-SOc4GZTgtfvwraSMmZhMR1fQTJPbX/exec';
var FOTOS_BASE = '/carta/lounge/fotos/';
/* =========================================== */

var DATA = null;
var PLANOS = [];
var observadorTabs = null;

function fmtPrecio(p){
  if (p === null || isNaN(p)) return '';
  return '$' + Number(p).toLocaleString('es-AR');
}
function srcFoto(nombre){
  if(!nombre) return null;
  return FOTOS_BASE + encodeURIComponent(nombre);
}
function esVideo(prod){
  return prod.tipo === 'video' || /\.(mp4|webm|mov)$/i.test(prod.foto || '');
}

function cargar(){
  document.getElementById('error').style.display = 'none';
  document.getElementById('cargando').style.display = 'flex';
  fetch(API_URL)
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(json){ DATA = json; render(); })
    .catch(function(){
      document.getElementById('cargando').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
    });
}

function render(){
  var main = document.getElementById('carta');
  var tabs = document.getElementById('tabs');
  main.innerHTML = ''; tabs.innerHTML = ''; PLANOS = [];

  DATA.secciones.forEach(function(sec, si){
    var id = 'sec-' + si;

    var b = document.createElement('button');
    b.className = 'tab'; b.textContent = sec.seccion; b.dataset.destino = id;
    b.onclick = function(){
      var el = document.getElementById(id);
      var y = el.getBoundingClientRect().top + window.scrollY - 60;
      window.scrollTo({top:y, behavior:'smooth'});
    };
    tabs.appendChild(b);

    var s = document.createElement('section');
    s.id = id;
    s.innerHTML =
      '<div class="titulo-seccion"><h2>' + esc(sec.seccion) + '</h2>' +
      '<div class="filete"></div>' +
      '<span class="cuenta">' + sec.productos.length + '</span></div>';

    var g = document.createElement('div');
    g.className = 'grilla';

    sec.productos.forEach(function(p){
      var idxGlobal = PLANOS.length;
      PLANOS.push(p);

      var t = document.createElement('button');
      t.className = 'tile';
      var media;
      if (p.foto){
        if (esVideo(p)){
          media = '<video src="' + srcFoto(p.foto) + '" muted playsinline preload="metadata"></video>';
        } else {
          media = '<img loading="lazy" decoding="async" src="' + srcFoto(p.foto) + '" alt="' + esc(p.producto) + '" onerror="this.closest(\'.tile\').classList.add(\'sin-foto\');this.outerHTML=\'<div class=fondo>' + inicial(p.producto) + '</div>\'">';
        }
      } else {
        t.classList.add('sin-foto');
        media = '<div class="fondo">' + inicial(p.producto) + '</div>';
      }
      var precio = fmtPrecio(p.precio);
      t.innerHTML = media +
        '<div class="chip">' +
          '<span class="nombre">' + esc(p.producto) + '</span>' +
          (precio ? '<span class="precio">' + precio + '</span>' : '') +
        '</div>';
      t.onclick = function(){ abrirVisor(idxGlobal); };
      g.appendChild(t);
    });

    s.appendChild(g);
    main.appendChild(s);
  });

  document.getElementById('cargando').style.display = 'none';
  document.getElementById('nav').hidden = false;
  document.getElementById('pie').hidden = false;
  activarSpyTabs();
}

function activarSpyTabs(){
  if (observadorTabs) observadorTabs.disconnect();
  var tabs = Array.prototype.slice.call(document.querySelectorAll('.tab'));
  observadorTabs = new IntersectionObserver(function(entradas){
    entradas.forEach(function(e){
      if (e.isIntersecting){
        tabs.forEach(function(t){ t.classList.toggle('activa', t.dataset.destino === e.target.id); });
        var activa = document.querySelector('.tab.activa');
        if (activa) activa.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'});
      }
    });
  }, {rootMargin:'-60px 0px -75% 0px', threshold:0});
  document.querySelectorAll('main section').forEach(function(s){ observadorTabs.observe(s); });
}

/* ---------- VISOR ---------- */
function abrirVisor(idx){
  var v = document.getElementById('visor');
  v.innerHTML = '';
  PLANOS.forEach(function(p, i){
    var d = document.createElement('div');
    d.className = 'slide';
    var media;
    if (p.foto){
      if (esVideo(p)){
        media = '<video src="' + srcFoto(p.foto) + '" muted loop playsinline autoplay preload="none"></video>';
      } else {
        media = '<img loading="lazy" decoding="async" src="' + srcFoto(p.foto) + '" alt="">';
      }
    } else {
      media = '<div class="sin">' + inicial(p.producto) + '</div>';
    }
    d.innerHTML =
      '<div class="media">' + media + '</div>' +
      '<div class="ficha">' +
        '<div class="etiqueta">' + esc(p.seccion) + '</div>' +
        '<h3>' + esc(p.producto) + '</h3>' +
        (p.descripcion ? '<div class="desc">' + esc(p.descripcion) + '</div>' : '') +
        '<div class="valor">' + fmtPrecio(p.precio) + '</div>' +
      '</div>' +
      (i < PLANOS.length - 1 ? '<div class="pista">▲<span>deslizá</span></div>' : '');
    v.appendChild(d);
  });
  v.classList.add('abierto');
  document.body.style.overflow = 'hidden';
  v.children[idx].scrollIntoView();
  history.pushState({visor:true}, '');
}
function cerrarVisor(desdePop){
  var v = document.getElementById('visor');
  if (!v.classList.contains('abierto')) return;
  v.classList.remove('abierto');
  document.body.style.overflow = '';
  setTimeout(function(){ v.innerHTML = ''; }, 250);
  if (!desdePop && history.state && history.state.visor) history.back();
}
document.getElementById('cerrar').onclick = function(){ cerrarVisor(false); };
window.addEventListener('popstate', function(){ cerrarVisor(true); });

/* ---------- utiles ---------- */
function esc(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function inicial(s){ return esc((s || '?').trim().charAt(0).toUpperCase()); }

cargar();
</script>
</body>
</html>
