<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Carta — Chiringuito Lounge</title>
<meta name="description" content="La carta de Chiringuito Lounge, Mercado de Maschwitz.">
<meta name="theme-color" content="#171310">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --carbon:#171310;--carbon-2:#221C16;--hueso:#F4EEE3;--hueso-dim:#B9AF9E;
    --ambar:#E0A33E;--rojo:#A8231D;--rojo-claro:#C63A30;
    --linea:rgba(244,238,227,.12);
    --display:'Oswald',sans-serif;--texto:'Jost',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    background:radial-gradient(130% 70% at 50% -10%, rgba(224,163,62,.10), transparent 55%), var(--carbon);
    color:var(--hueso);font-family:var(--texto);font-weight:300;letter-spacing:.01em;min-height:100dvh;
  }

  header{
    padding:calc(env(safe-area-inset-top) + 30px) 20px 24px;
    text-align:center;position:relative;border-bottom:1px solid var(--linea);
  }
  .cinta{
    display:inline-block;transform:rotate(-3deg);
    background:linear-gradient(160deg, var(--rojo-claro), var(--rojo));
    color:var(--hueso);font-weight:500;font-size:11px;letter-spacing:.34em;text-transform:uppercase;
    padding:7px 18px;border-radius:3px;
    box-shadow:0 6px 18px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.14);
  }
  h1{
    font-family:var(--display);font-weight:700;text-transform:uppercase;
    font-size:clamp(46px,12.5vw,84px);line-height:.98;letter-spacing:.015em;margin-top:16px;
    text-shadow:0 4px 22px rgba(0,0,0,.55);
  }
  h1 span{display:block;font-size:.52em;font-weight:600;letter-spacing:.12em;color:var(--ambar)}
  .sub{margin-top:10px;font-size:12px;color:var(--hueso-dim);letter-spacing:.22em;text-transform:uppercase}

  .accion-header{
    margin-top:16px;display:inline-flex;align-items:center;gap:6px;
    font-family:var(--texto);font-weight:500;font-size:12px;letter-spacing:.06em;
    color:var(--hueso);text-decoration:none;
    padding:9px 16px;border-radius:999px;
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.015));
    border:1px solid rgba(244,238,227,.16);
  }
  .accion-header svg{width:14px;height:14px;flex:0 0 auto}

  nav{
    position:sticky;top:0;z-index:40;
    background:linear-gradient(rgba(23,19,16,.94), rgba(23,19,16,.82));
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid var(--linea);
  }
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:13px 16px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto;cursor:pointer;white-space:nowrap;
    font-family:var(--display);font-weight:500;font-size:14px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--hueso-dim);padding:9px 16px;border-radius:999px;
    background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.015));
    border:1px solid rgba(244,238,227,.14);
    box-shadow:0 2px 10px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
    transition:color .2s, background .2s, transform .15s;
  }
  .tab:active{transform:scale(.96)}
  .tab.activa{
    color:var(--hueso);
    background:linear-gradient(160deg, var(--rojo-claro), var(--rojo));
    border-color:rgba(244,238,227,.22);
    box-shadow:0 6px 16px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.16);
  }

  main{padding-bottom:110px}
  section{padding-top:6px}
  .titulo-seccion{display:flex;align-items:center;gap:14px;padding:30px 20px 14px}
  .titulo-seccion h2{
    font-family:var(--display);font-weight:600;text-transform:uppercase;
    font-size:27px;line-height:1;letter-spacing:.04em;
  }
  .titulo-seccion .cuenta{
    font-family:var(--texto);font-size:10.5px;font-weight:500;color:var(--hueso-dim);
    letter-spacing:.2em;border:1px solid var(--linea);border-radius:999px;padding:4px 10px;
  }
  .titulo-seccion .filete{flex:1;height:1px;background:var(--linea)}
  .grilla{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
  @media(min-width:720px){ .grilla{grid-template-columns:repeat(4,1fr);gap:3px} main{max-width:960px;margin:0 auto} }

  .tile{position:relative;aspect-ratio:1;overflow:hidden;background:var(--carbon-2);cursor:pointer;border:none;padding:0}
  .tile img,.tile video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease-out}
  .tile:active img{transform:scale(1.05)}
  .tile .chip{position:absolute;left:6px;bottom:6px;max-width:calc(100% - 12px);display:flex;flex-direction:column;align-items:flex-start;gap:2px;pointer-events:none}
  .tile .chip .nombre{
    font-weight:500;font-size:11px;line-height:1.2;color:var(--hueso);
    background:rgba(15,12,9,.62);backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:4px 8px;
    max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .tile .chip .precio{
    font-family:var(--display);font-weight:600;font-size:11.5px;letter-spacing:.05em;color:var(--ambar);
    background:rgba(15,12,9,.62);backdrop-filter:blur(6px);
    border:1px solid rgba(224,163,62,.22);border-radius:7px;padding:3px 8px;
  }
  .tile.sin-foto .fondo{
    width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    font-family:var(--display);font-weight:700;font-size:46px;color:rgba(244,238,227,.16);
    background:radial-gradient(80% 80% at 50% 30%, #2B241C, var(--carbon-2));
  }

  .tile .sel{
    position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;
    border:2px solid rgba(244,238,227,.55);background:rgba(15,12,9,.5);
    display:none;align-items:center;justify-content:center;pointer-events:none;
  }
  body.modo-comparar .tile .sel{display:flex}
  .tile.seleccionado .sel{background:var(--rojo);border-color:var(--rojo)}
  .tile.seleccionado .sel svg{opacity:1}
  .sel svg{width:14px;height:14px;opacity:0}

  #barra-comparar{
    position:fixed;left:0;right:0;bottom:0;z-index:70;
    padding:14px 16px calc(env(safe-area-inset-bottom) + 14px);
    display:flex;justify-content:center;
  }
  #btn-comparar{
    display:flex;align-items:center;gap:8px;cursor:pointer;
    font-family:var(--display);font-weight:600;font-size:13.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--hueso);padding:13px 24px;border-radius:999px;
    background:linear-gradient(160deg, var(--rojo-claro), var(--rojo));
    border:1px solid rgba(244,238,227,.2);
    box-shadow:0 8px 22px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.16);
  }
  #btn-comparar svg{width:16px;height:16px}
  body.modo-comparar #btn-comparar{background:linear-gradient(160deg,#3a332a,#26211a);color:var(--hueso-dim)}
  #btn-comparar .icono-x{display:none;width:16px;height:16px}
  body.modo-comparar #btn-comparar .icono-vs{display:none}
  body.modo-comparar #btn-comparar .icono-x{display:block}
  #contador-sel{
    display:none;align-items:center;justify-content:center;
    min-width:18px;height:18px;padding:0 4px;border-radius:999px;
    background:var(--ambar);color:#171310;font-size:11px;font-weight:700;
  }
  body.modo-comparar #contador-sel{display:flex}

  #comparador{
    position:fixed;inset:0;z-index:120;background:rgba(10,8,6,.88);
    backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;padding:0;
  }
  #comparador.abierto{display:flex}
  .comp-panel{
    width:100%;max-width:960px;max-height:88dvh;overflow-y:auto;
    background:var(--carbon);border-radius:20px 20px 0 0;
    padding:14px 16px calc(env(safe-area-inset-bottom) + 24px);
  }
  .comp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .comp-cerrar-x{
    width:36px;height:36px;border-radius:50%;cursor:pointer;
    background:rgba(255,255,255,.06);border:1px solid var(--linea);
    color:var(--hueso);font-size:18px;line-height:1;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  }
  .comp-cerrar{width:38px;height:5px;border-radius:99px;background:var(--linea);margin:0 auto 16px}
  .comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .comp-card{background:var(--carbon-2);border-radius:14px;overflow:hidden;border:1px solid var(--linea)}
  .comp-foto{aspect-ratio:1;background:var(--carbon-2);position:relative}
  .comp-foto img{width:100%;height:100%;object-fit:cover;display:block}
  .comp-foto .fondo{
    width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    font-family:var(--display);font-weight:700;font-size:38px;color:rgba(244,238,227,.16);
  }
  .comp-info{padding:12px}
  .comp-info h3{font-family:var(--display);font-weight:600;text-transform:uppercase;font-size:16px;line-height:1.15;letter-spacing:.02em}
  .comp-info .desc{margin-top:6px;font-size:12px;line-height:1.4;color:var(--hueso-dim)}
  .comp-info .precio{margin-top:8px;font-family:var(--display);font-weight:600;font-size:17px;color:var(--ambar)}
  .comp-vs{text-align:center;font-family:var(--display);font-weight:700;color:var(--hueso-dim);font-size:12px;letter-spacing:.2em;margin:16px 0 4px}

  .like-btn{
    display:inline-flex;align-items:center;gap:7px;cursor:pointer;
    background:rgba(23,19,16,.6);backdrop-filter:blur(8px);
    border:1px solid var(--linea);border-radius:999px;padding:9px 15px;
    color:var(--hueso);font-family:var(--texto);font-weight:500;font-size:13px;
  }
  .like-btn svg{width:16px;height:16px;stroke:var(--hueso);fill:none;transition:fill .15s, stroke .15s}
  .like-btn.dado svg{fill:var(--rojo-claro);stroke:var(--rojo-claro)}
  .like-btn.dado{border-color:rgba(198,58,48,.35)}

  #visor{
    position:fixed;inset:0;z-index:100;background:var(--carbon);
    overflow-y:auto;scroll-snap-type:y mandatory;overscroll-behavior:contain;
    opacity:0;pointer-events:none;transition:opacity .22s ease;
  }
  #visor.abierto{opacity:1;pointer-events:auto}
  .slide{height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;display:flex;flex-direction:column;position:relative}
  .slide .media{flex:1 1 0;min-height:0;position:relative;background:var(--carbon-2)}
  .slide .media img,.slide .media video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .slide .media::after{content:"";position:absolute;inset:auto 0 0 0;height:34%;background:linear-gradient(to top,var(--carbon),transparent)}
  .slide .media .sin{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:120px;color:rgba(244,238,227,.10)}
  .slide .ficha{flex:0 0 auto;padding:6px 22px calc(env(safe-area-inset-bottom) + 30px)}
  .slide .fila-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .slide .etiqueta{
    display:inline-block;transform:rotate(-2deg);
    background:linear-gradient(160deg, var(--rojo-claro), var(--rojo));
    color:var(--hueso);font-weight:500;font-size:10px;letter-spacing:.3em;text-transform:uppercase;
    padding:5px 12px;border-radius:3px;
    box-shadow:0 4px 14px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.12);
  }
  .slide h3{
    font-family:var(--display);font-weight:700;text-transform:uppercase;
    font-size:clamp(30px,8vw,42px);line-height:1.02;letter-spacing:.015em;margin-top:12px;
    text-shadow:0 3px 16px rgba(0,0,0,.5);
  }
  .slide .desc{margin-top:10px;font-size:15px;line-height:1.55;color:var(--hueso-dim);max-width:520px}
  .slide .valor{margin-top:14px;font-family:var(--display);font-weight:600;font-size:27px;letter-spacing:.04em;color:var(--ambar)}
  .slide .pista{
    position:absolute;right:18px;bottom:calc(env(safe-area-inset-bottom) + 22px);
    display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--hueso-dim);font-size:10px;letter-spacing:.2em;
    animation:flotar 2.2s ease-in-out infinite;
  }
  @keyframes flotar{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  #cerrar{
    position:fixed;top:calc(env(safe-area-inset-top) + 14px);right:14px;z-index:110;
    width:44px;height:44px;border-radius:50%;
    background:rgba(23,19,16,.55);backdrop-filter:blur(10px);
    border:1px solid var(--linea);color:var(--hueso);font-size:20px;line-height:1;cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;
  }
  #visor.abierto ~ #cerrar{display:flex}

  #cargando,#error{min-height:55dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px;text-align:center}
  .brasa{width:10px;height:10px;border-radius:50%;background:var(--ambar);animation:brasa 1.1s ease-in-out infinite}
  @keyframes brasa{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  #cargando p,#error p{color:var(--hueso-dim);font-size:14px;letter-spacing:.1em}
  #error{display:none}
  #error button{
    font-family:var(--display);font-weight:600;font-size:14px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--hueso);background:linear-gradient(160deg, var(--rojo-claro), var(--rojo));
    border:1px solid rgba(244,238,227,.2);border-radius:999px;padding:13px 30px;cursor:pointer;
    box-shadow:0 6px 16px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.14);
  }

  footer{padding:34px 20px calc(env(safe-area-inset-bottom) + 110px);text-align:center;border-top:1px solid var(--linea)}
  footer .f-marca{font-family:var(--display);font-weight:600;text-transform:uppercase;font-size:19px;letter-spacing:.06em}
  footer p{margin-top:6px;font-size:12px;color:var(--hueso-dim);letter-spacing:.1em}
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important} html{scroll-behavior:auto} }
</style>
</head>
<body>

<header>
  <div class="cinta">Grupo El Chiringuito</div>
  <h1>Chiringuito<span>Lounge</span></h1>
  <div class="sub">Mercado de Maschwitz</div>
  <a class="accion-header" href="https://g.page/r/CVhJqjD3nvkTEAE/review" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 0-7 7c0 5.5 7 13 7 13s7-7.5 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
    Dejanos tu reseña
  </a>
</header>

<nav id="nav" hidden><div class="tabs" id="tabs"></div></nav>

<div id="cargando"><div class="brasa"></div><p>Encendiendo la carta…</p></div>

<div id="error">
  <p>No pudimos cargar la carta.<br>Fijate la señal y probá de nuevo.</p>
  <button onclick="cargar()">Reintentar</button>
</div>

<main id="carta"></main>

<footer hidden id="pie">
  <div class="f-marca">Chiringuito Lounge</div>
  <p>Mercado de Maschwitz · Ingeniero Maschwitz</p>
</footer>

<div id="barra-comparar" hidden>
  <button id="btn-comparar" onclick="toggleModoComparar()">
    <svg class="icono-vs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v18M16 3v18M3 8h5M16 8h5M3 16h5M16 16h5"/></svg>
    <svg class="icono-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    <span id="txt-comparar">Comparar</span>
    <span id="contador-sel">0</span>
  </button>
</div>

<div id="comparador" onclick="if(event.target.id==='comparador') cerrarComparador()">
  <div class="comp-panel">
    <div class="comp-header">
      <div class="comp-vs" style="margin:0">FRENTE A FRENTE</div>
      <button class="comp-cerrar-x" onclick="cerrarComparador()" aria-label="Cerrar comparador">✕</button>
    </div>
    <div class="comp-grid" id="comp-grid"></div>
  </div>
</div>

<div id="visor" aria-modal="true" role="dialog"></div>
<button id="cerrar" aria-label="Cerrar">✕</button>

<script>
/* ================= CONFIG ================= */
var API_URL = 'https://script.google.com/macros/s/AKfycbzOW8QgMiXCM8auujV9DFwGhgvB-yTPk4ukog-SOc4GZTgtfvwraSMmZhMR1fQTJPbX/exec';
var FOTOS_BASE = '/carta/lounge/fotos/';
/* =========================================== */

var DATA = null;
var PLANOS = [];
var observadorTabs = null;
var comparando = false;
var seleccion = [];

function fmtPrecio(p){ if (p === null || isNaN(p)) return ''; return '$' + Number(p).toLocaleString('es-AR'); }
function srcFoto(nombre){ if(!nombre) return null; return FOTOS_BASE + encodeURIComponent(nombre); }
function esVideo(prod){ return prod.tipo === 'video' || /\.(mp4|webm|mov)$/i.test(prod.foto || ''); }
function claveLike(p){ return 'like_' + p.seccion + '_' + p.producto; }
function yaDioLike(p){ try { return localStorage.getItem(claveLike(p)) === '1'; } catch(e){ return false; } }
function marcarLike(p){ try { localStorage.setItem(claveLike(p), '1'); } catch(e){} }

function cargar(){
  document.getElementById('error').style.display = 'none';
  document.getElementById('cargando').style.display = 'flex';
  fetch(API_URL)
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(json){ DATA = json; render(); })
    .catch(function(){
      document.getElementById('cargando').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
    });
}

function render(){
  var main = document.getElementById('carta');
  var tabs = document.getElementById('tabs');
  main.innerHTML = ''; tabs.innerHTML = ''; PLANOS = [];

  DATA.secciones.forEach(function(sec, si){
    var id = 'sec-' + si;

    var b = document.createElement('button');
    b.className = 'tab'; b.textContent = sec.seccion; b.dataset.destino = id;
    b.onclick = function(){
      var el = document.getElementById(id);
      var y = el.getBoundingClientRect().top + window.scrollY - 58;
      window.scrollTo({top:y, behavior:'smooth'});
    };
    tabs.appendChild(b);

    var s = document.createElement('section');
    s.id = id;
    s.innerHTML =
      '<div class="titulo-seccion"><h2>' + esc(sec.seccion) + '</h2>' +
      '<div class="filete"></div>' +
      '<span class="cuenta">' + sec.productos.length + '</span></div>';

    var g = document.createElement('div');
    g.className = 'grilla';

    sec.productos.forEach(function(p){
      var idxGlobal = PLANOS.length;
      PLANOS.push(p);

      var t = document.createElement('button');
      t.className = 'tile';
      t.dataset.idx = idxGlobal;
      var media;
      if (p.foto){
        if (esVideo(p)){
          media = '<video src="' + srcFoto(p.foto) + '" muted playsinline preload="metadata"></video>';
        } else {
          media = '<img loading="lazy" decoding="async" src="' + srcFoto(p.foto) + '" alt="' + esc(p.producto) + '" onerror="this.closest(\'.tile\').classList.add(\'sin-foto\');this.outerHTML=\'<div class=fondo>' + inicial(p.producto) + '</div>\'">';
        }
      } else {
        t.classList.add('sin-foto');
        media = '<div class="fondo">' + inicial(p.producto) + '</div>';
      }
      var precio = fmtPrecio(p.precio);
      t.innerHTML = media +
        '<div class="sel"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M4 12l5 5L20 6"/></svg></div>' +
        '<div class="chip">' +
          '<span class="nombre">' + esc(p.producto) + '</span>' +
          (precio ? '<span class="precio">' + precio + '</span>' : '') +
        '</div>';
      t.onclick = function(){
        if (comparando) { toggleSeleccion(idxGlobal, t); }
        else { abrirVisor(idxGlobal); }
      };
      g.appendChild(t);
    });

    s.appendChild(g);
    main.appendChild(s);
  });

  document.getElementById('cargando').style.display = 'none';
  document.getElementById('nav').hidden = false;
  document.getElementById('pie').hidden = false;
  document.getElementById('barra-comparar').hidden = false;
  activarSpyTabs();
}

function activarSpyTabs(){
  if (observadorTabs) observadorTabs.disconnect();
  var tabs = Array.prototype.slice.call(document.querySelectorAll('.tab'));
  observadorTabs = new IntersectionObserver(function(entradas){
    entradas.forEach(function(e){
      if (e.isIntersecting){
        tabs.forEach(function(t){ t.classList.toggle('activa', t.dataset.destino === e.target.id); });
        var activa = document.querySelector('.tab.activa');
        if (activa) activa.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'});
      }
    });
  }, {rootMargin:'-58px 0px -75% 0px', threshold:0});
  document.querySelectorAll('main section').forEach(function(s){ observadorTabs.observe(s); });
}

/* ---------- COMPARADOR ---------- */
function toggleModoComparar(){
  comparando = !comparando;
  seleccion = [];
  document.body.classList.toggle('modo-comparar', comparando);
  document.getElementById('txt-comparar').textContent = comparando ? 'Salir de comparar' : 'Comparar';
  document.getElementById('contador-sel').textContent = '0';
  document.querySelectorAll('.tile.seleccionado').forEach(function(t){ t.classList.remove('seleccionado'); });
}
function toggleSeleccion(idx, tile){
  var pos = seleccion.indexOf(idx);
  if (pos > -1){
    seleccion.splice(pos,1); tile.classList.remove('seleccionado');
  } else {
    if (seleccion.length >= 2){
      var primerIdx = seleccion.shift();
      document.querySelector('.tile[data-idx="'+primerIdx+'"]').classList.remove('seleccionado');
    }
    seleccion.push(idx); tile.classList.add('seleccionado');
  }
  document.getElementById('contador-sel').textContent = seleccion.length;
  if (seleccion.length === 2) abrirComparador();
}
function abrirComparador(){
  var grid = document.getElementById('comp-grid');
  grid.innerHTML = seleccion.map(function(idx){
    var p = PLANOS[idx];
    var foto = p.foto
      ? '<img src="'+srcFoto(p.foto)+'" alt="">'
      : '<div class="fondo">'+inicial(p.producto)+'</div>';
    return '<div class="comp-card">'+
      '<div class="comp-foto">'+foto+'</div>'+
      '<div class="comp-info">'+
        '<h3>'+esc(p.producto)+'</h3>'+
        (p.descripcion ? '<div class="desc">'+esc(p.descripcion)+'</div>' : '')+
        '<div class="precio">'+fmtPrecio(p.precio)+'</div>'+
      '</div></div>';
  }).join('');
  document.getElementById('comparador').classList.add('abierto');
}
function cerrarComparador(){
  document.getElementById('comparador').classList.remove('abierto');
  toggleModoComparar();
}

/* ---------- LIKES ---------- */
function darLike(p, btn){
  if (yaDioLike(p)) return;
  marcarLike(p);
  var actual = Number(btn.dataset.likes) || 0;
  actualizarBotonLike(btn, actual + 1, true);
  fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({accion:'like', producto:p.producto, seccion:p.seccion})
  }).then(function(r){ return r.json(); })
    .then(function(res){ if (res && res.ok) actualizarBotonLike(btn, res.likes, true); })
    .catch(function(){});
}
function actualizarBotonLike(btn, n, dado){
  btn.dataset.likes = n;
  btn.classList.toggle('dado', !!dado);
  btn.querySelector('.n-likes').textContent = n;
}

/* ---------- VISOR ---------- */
function abrirVisor(idx){
  var v = document.getElementById('visor');
  v.innerHTML = '';
  PLANOS.forEach(function(p, i){
    var d = document.createElement('div');
    d.className = 'slide';
    var media;
    if (p.foto){
      if (esVideo(p)){
        media = '<video src="' + srcFoto(p.foto) + '" muted loop playsinline autoplay preload="none"></video>';
      } else {
        media = '<img loading="lazy" decoding="async" src="' + srcFoto(p.foto) + '" alt="">';
      }
    } else {
      media = '<div class="sin">' + inicial(p.producto) + '</div>';
    }
    var dado = yaDioLike(p);
    var pStr = JSON.stringify(p).replace(/"/g,'&quot;');
    d.innerHTML =
      '<div class="media">' + media + '</div>' +
      '<div class="ficha">' +
        '<div class="fila-top">' +
          '<div class="etiqueta">' + esc(p.seccion) + '</div>' +
          '<button class="like-btn' + (dado?' dado':'') + '" data-likes="' + (p.likes||0) + '" onclick="darLike(' + pStr + ', this)">' +
            '<svg viewBox="0 0 24 24" stroke-width="2"><path d="M20.8 4.6c-1.6-1.5-4.2-1.5-5.8 0L12 7.5 9 4.6c-1.6-1.5-4.2-1.5-5.8 0-1.7 1.6-1.7 4.2 0 5.8L12 19l8.8-8.6c1.7-1.6 1.7-4.2 0-5.8z"/></svg>' +
            '<span class="n-likes">' + (p.likes||0) + '</span>' +
          '</button>' +
        '</div>' +
        '<h3>' + esc(p.producto) + '</h3>' +
        (p.descripcion ? '<div class="desc">' + esc(p.descripcion) + '</div>' : '') +
        '<div class="valor">' + fmtPrecio(p.precio) + '</div>' +
      '</div>' +
      (i < PLANOS.length - 1 ? '<div class="pista">▲<span>deslizá</span></div>' : '');
    v.appendChild(d);
  });
  v.classList.add('abierto');
  document.body.style.overflow = 'hidden';
  v.children[idx].scrollIntoView();
  history.pushState({visor:true}, '');
}
function cerrarVisor(desdePop){
  var v = document.getElementById('visor');
  if (!v.classList.contains('abierto')) return;
  v.classList.remove('abierto');
  document.body.style.overflow = '';
  setTimeout(function(){ v.innerHTML = ''; }, 250);
  if (!desdePop && history.state && history.state.visor) history.back();
}
document.getElementById('cerrar').onclick = function(){ cerrarVisor(false); };
window.addEventListener('popstate', function(){ cerrarVisor(true); });

/* ---------- utiles ---------- */
function esc(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function inicial(s){ return esc((s || '?').trim().charAt(0).toUpperCase()); }

cargar();
</script>
